spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_store}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-a-long-local-value}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
