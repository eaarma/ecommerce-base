spring:
  application:
    name: backend
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:./backend/.env[.properties]
  profiles:
    active: dev

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

app:
  email:
    enabled: ${EMAIL_ENABLED:}
    from: ${SMTP_FROM:${SMTP_USER:}}
    contact-receiver: ${CONTACT_RECEIVER:${SMTP_FROM:${SMTP_USER:}}}
    store-name: ${EMAIL_STORE_NAME:Ecommerce Store}

management:
  endpoints:
    web:
      exposure:
        include: health,info

stripe:
  enabled: ${STRIPE_ENABLED:true}
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  account-id: ${STRIPE_ACCOUNT_ID:}
  api-version: ${STRIPE_API_VERSION:}
