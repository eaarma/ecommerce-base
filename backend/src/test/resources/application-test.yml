spring:
  datasource:
    url: jdbc:h2:mem:backend-test-db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

app:
  email:
    enabled: false

stripe:
  enabled: false

security:
  jwt:
    secret: change-this-test-secret-to-a-long-32-byte-value
    expiration-ms: 86400000
